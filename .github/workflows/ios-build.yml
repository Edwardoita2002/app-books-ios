name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Genera la carpeta nativa /ios e instala los Pods automáticamente
      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios

      # Compila la aplicación usando el Scheme exacto: MiLectorPDF
      - name: Build iOS App
        run: |
          cd ios
          xcodebuild -workspace MiLectorPDF.xcworkspace \
                     -scheme MiLectorPDF \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO

      # Empaqueta el archivo .app en un archivo .ipa
      - name: Package into Unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build
          zip -r ../app-unsigned.ipa Payload

      # Sube el archivo para descargarlo
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: app-unsigned.ipa