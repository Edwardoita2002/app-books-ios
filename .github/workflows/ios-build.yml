name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Internal build ID'
        required: false
        default: '1'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Genera la carpeta nativa /ios en la máquina virtual
      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios

      # Instala las dependencias nativas de iOS (Cocoapods)
      - name: Install Pods
        run: |
          cd ios
          pod install

      # Compila la aplicación usando Xcode sin firma de Apple
      - name: Build iOS App
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
                     -scheme $(xcodebuild -list -json | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf-8')); console.log(data.workspace.schemes[0]);") \
                     -configuration Release \
                     -sdk iphoneos \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO

      # Empaqueta el ejecutable .app en un archivo .ipa
      - name: Package into Unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build
          zip -r ../app-unsigned.ipa Payload

      # Guarda el archivo para que lo descargues
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: app-unsigned.ipa