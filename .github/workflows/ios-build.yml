name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Genera la carpeta nativa /ios de forma temporal en el servidor de GitHub
      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios

      # Instala las dependencias nativas necesarias de iOS
      - name: Install Pods
        run: |
          cd ios
          pod install

      # Compila el proyecto generando el archivo ejecutable (.app)
      - name: Build iOS App
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
                     -scheme $(xcodebuild -list -json | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf-8')); console.log(data.workspace.schemes[0]);") \
                     -configuration Release \
                     -sdk iphoneos \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO

      # Empaqueta el ejecutable en un archivo instalador .IPA sin firmar
      - name: Package into Unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build
          zip -r ../app-unsigned.ipa Payload

      # Sube el archivo IPA final como un artefacto descargable
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: app-unsigned.ipa