name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # 1. Generar la carpeta /ios en la máquina virtual de GitHub
      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios

      # 2. Instalar Cocoapods nativos en la carpeta generada
      - name: Install Pods
        run: |
          cd ios
          pod install

      # 3. Compilar el proyecto en modo Release sin firma de Apple
      - name: Build iOS App
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
                     -scheme $(xcodebuild -list -json | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf-8')); console.log(data.workspace.schemes[0]);") \
                     -configuration Release \
                     -sdk iphoneos \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO

      # 4. Empaquetar a .IPA (para cargarlo con Sideloadly o AltStore)
      - name: Package into Unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build
          zip -r ../app-unsigned.ipa Payload

      # 5. Guardar el archivo final
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: app-unsigned.ipa