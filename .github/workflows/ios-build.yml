name: Build iOS App (IPA)
on:
  workflow_dispatch: # Esto te permite activar la compilación manualmente con un botón en GitHub

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Run Expo Prebuild (Generar iOS nativo)
        run: npx expo prebuild --platform ios

      - name: Build iOS App (.app)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace -scheme $(xcodebuild -list -json | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf-8')); console.log(data.workspace.schemes[0]);") -configuration Release -sdk iphoneos clean build CODE_SIGNING_ALLOWED=NO

      - name: Package into .IPA (Simular Firma)
        run: |
          mkdir -p build/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app build/Payload/
          cd build
          zip -r ../app-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: app-unsigned.ipa